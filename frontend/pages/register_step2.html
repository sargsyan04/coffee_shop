<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../media/logo.png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Coffee Shop — Подтверждение</title>
</head>
<body>

    <div class="central_block auth_block">
        <div class="central_header">
            <span class="eyebrow" id="verify-eyebrow">Шаг 2 из 2</span>
            <img src="../media/big_logo.png" alt="Coffee Shop">
            <h1>Подтвердите email</h1>
        </div>

        <!--  Progress dots — final step (2 of 2) is active  -->
        <div class="step_indicator" id="step-indicator">
            <span class="step_dot done"></span>
            <span class="step_dot active"></span>
        </div>

        <!--  Filled in by register_step2.js from sessionStorage  -->
        <p class="confirm_text">Мы отправили 6-значный код на <strong id="user-email">вашу почту</strong></p>

        <!--  Step 2 of 2 — email verification code, see register_step2.js  -->
        <form class="auth_form" id="step3-form" novalidate>
            <div class="form_group">
                <label for="code">Код подтверждения</label>
                <input type="text" id="code" name="code" maxlength="6" placeholder="000000" inputmode="numeric" required>
            </div>

            <button type="submit" class="button_s sign_in full_width">Подтвердить</button>
            <!--  Triggers a new verification code to be sent -->
            <button type="button" class="skip_link" id="resend-code">Отправить код повторно</button>

            <p class="form_status" id="form-status" hidden></p>
        </form>
    </div>

    <!--  api.js must load before register_step2.js -->
    <script src="../js/api.js"></script>
    <script src="../js/register_step2.js"></script>
</body>
</html>
