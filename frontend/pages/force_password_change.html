<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../media/logo.png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Coffee Shop — Смена пароля</title>
</head>
<body>

    <div class="central_block auth_block">
        <div class="central_header">
            <span class="eyebrow">Требуется действие</span>
            <img src="../media/big_logo.png" alt="Coffee Shop">
            <h1>Задайте новый пароль</h1>
        </div>

        <p class="confirm_text">
            Это первый вход с временным паролем. Прежде чем продолжить,
            задайте постоянный пароль для своего аккаунта.
        </p>

        <form class="auth_form" id="force-password-form" novalidate>
            <div class="form_group">
                <label for="new_password">Новый пароль</label>
                <input type="password" id="new_password" name="new_password" placeholder="••••••••" required>
            </div>
            <div class="form_group">
                <label for="new_password_confirm">Повторите пароль</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="••••••••" required>
            </div>

            <button type="submit" class="button_s sign_in full_width">Сохранить и продолжить</button>

            <p class="form_status" id="form-status" hidden></p>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/force_password_change.js"></script>
</body>
</html>
