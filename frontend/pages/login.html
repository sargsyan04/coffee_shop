<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../media/logo.png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Coffee Shop — Вход</title>
</head>
<body>

    <div class="central_block auth_block">
        <div class="central_header">
            <span class="eyebrow">С возвращением</span>
            <img src="../media/big_logo.png" alt="Coffee Shop">
            <h1>Вход</h1>
        </div>

    <a href="index.html" class="back_link">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Назад
    </a>

        <!-- Login form — handled client-side, see login.js -->
        <form class="auth_form" id="login-form" novalidate>
            <div class="form_group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form_group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <a href="#" class="forgot_link">Забыли пароль?</a>

            <button type="submit" class="button_s sign_in full_width">Войти</button>

            <!-- Filled in by login.js once the form is submitted -->
            <p class="form_status" id="form-status" hidden></p>
        </form>

        <p class="switch_text">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </div>

    <!-- api.js must load before login.js — login.js relies on apiLoginRequest/storeTokens -->
    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
