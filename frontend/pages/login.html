<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../media/logo.png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Coffee Shop — Вход</title>
</head>
<body>

    <div class="central_block auth_block">
        <div class="central_header">
            <span class="eyebrow">С возвращением</span>
            <img src="../media/site_logo.png" alt="Coffee Shop">
            <h1>Вход</h1>
        </div>

        <form class="auth_form" id="login-form" novalidate>
            <div class="form_group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form_group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <a href="#" class="forgot_link">Забыли пароль?</a>

            <button type="submit" class="button_s sign_in full_width">Войти</button>

            <p class="form_status" id="form-status" hidden></p>
        </form>

        <p class="switch_text">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
