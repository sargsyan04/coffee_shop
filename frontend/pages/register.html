<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../media/logo.png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Coffee Shop — Регистрация</title>
</head>
<body>

    <div class="central_block auth_block">
        <div class="central_header">
            <span class="eyebrow">Шаг 1 из 2</span>
            <img src="../media/big_logo.png" alt="Coffee Shop">
            <h1>Регистрация</h1>
        </div>

    <a href="index.html" class="back_link">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Назад
    </a>

        <!-- Progress dots — step 1 of 2 is active -->
        <div class="step_indicator">
            <span class="step_dot active"></span>
            <span class="step_dot"></span>
        </div>

        <!-- Single-step registration form: required account fields +
             optional profile fields, laid out in a 2-column grid,
             see register.js -->
        <form class="auth_form" id="register-form" novalidate>
            <div class="form_group">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="Как к вам обращаться" required>
            </div>

            <div class="form_group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form_group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form_group">
                <label for="password_confirm">Повторите пароль</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required>
            </div>

            <div class="form_group">
                <label for="birth_date">Дата рождения <span class="optional_label">(необязательно)</span></label>
                <input type="date" id="birth_date" name="birth_date">
            </div>

            <div class="form_group">
                <label for="phone">Телефон <span class="optional_label">(необязательно)</span></label>
                <input type="tel" id="phone" name="phone" placeholder="+374 XX XXX XXX">
            </div>

            <div class="form_group full_row">
                <label for="address">Адрес <span class="optional_label">(необязательно)</span></label>
                <input type="text" id="address" name="address" placeholder="Понадобится при доставке">
            </div>

            <button type="submit" class="button_s sign_in full_width full_row">Создать аккаунт</button>

            <!-- Filled in by register.js — e.g. password mismatch -->
            <p class="form_status full_row" id="form-status" hidden></p>
        </form>

        <p class="switch_text">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>

    <!-- api.js must load before register.js -->
    <script src="../js/api.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
